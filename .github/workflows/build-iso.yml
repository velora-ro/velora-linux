name: Build Velora Linux ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install live-build
        run: |
          sudo apt-get update -q
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin grub-common mtools dosfstools

      - name: Build Velora Linux ISO
        run: sudo bash build.sh

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: VeloraLinux-0.8
          path: iso/VeloraLinux-0.8.iso
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3
